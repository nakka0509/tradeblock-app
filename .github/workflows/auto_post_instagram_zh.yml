name: Daily Instagram Auto-Post (Chinese)

on:
  schedule:
    # 毎日 中国標準時(CST/UTC+8) 7:00, 12:00, 18:00 (UTC 23:00, 4:00, 10:00) に自動実行
    - cron: '0 23,4,10 * * *'
  workflow_dispatch: # GitHubの画面から手動でテスト実行できるボタン

jobs:

  # ===== 中国語アカウント（Account 3）=====
  post-chinese:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./marketing_automation/video_generator
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        npm install

    - name: Generate TTS and Pick random Chinese composition
      id: pick
      working-directory: ./marketing_automation/video_generator
      run: |
        node scripts/generate_tts_and_metadata.mjs
        COMP_ID=$(npx tsx scripts/prepare_daily_video.ts zh-CN)
        echo "composition=$COMP_ID" >> $GITHUB_OUTPUT

    - name: Render Video
      working-directory: ./marketing_automation/video_generator
      run: npx remotion render src/index.ts ${{ steps.pick.outputs.composition }} out/video.mp4 --props=src/dailyOverride.json --timeout=120000

    - name: Post to Instagram (Chinese account)
      working-directory: ./marketing_automation/video_generator
      env:
        IG_USER_ID: ${{ secrets.IG_USER_ID_3 }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN_3 }}
      run: |
        CAPTIONS=(
          "停止过度交易。Trade Block强制锁定帮助你冷静 🔒\n\n为什么90%的日内交易者会亏损？\n问题不在乎你的策略，而是大脑的“兴奋状态”导致了频繁交易。\n\nTrade Block通过设定计时器，在指定时间内强制屏蔽你的交易应用，防止情绪化的报复性交易。\n\n🔥 停止亏损后的上头交易\n🔥 停止因为恐惧而过早平仓\n\n让系统来阻止你破坏账户余额。\n\n✅ 立即点击主页链接下载，把不必要的亏损降到零。\n\n#交易 #外汇 #日内交易 #股票 #交易心理 #投资理财 #加密货币 #美股"
          "有时候，最好的交易就是不交易。 📉\n\n但管住手很难。Trade Block可以通过设定倒计时，物理锁定你的券商App，让你在这段时间内彻底远离市场。\n\n不要让情绪代替你下单。\n\n💡 赚钱的交易员懂得何时离场。\n\n✅ 点击个人资料链接下载，掌控你的交易纪律。\n\n#炒股 #外汇交易 #投资心理学 #美股开户 #黄金交易 #自律 #A股"
          "你现在是不是正在上头？ ⚠️\n\n“再做一单就好…” “我必须把亏的赚回来…”\n就是这样一次情绪化的交易，可能会抹平你一个月的利润。\n\nTrade Block是你的私人风控工具。设定锁定时间后，你将无法打开任何交易软件，直到头脑冷静下来。\n\n🔥 风险管理 = 情绪管理 🔥\n\n✅ 立即点击主页链接下载，不要再把钱还给市场了！\n\n#期权 #美股投资 #币圈 #数字货币 #交易日记 #股市 #投资经验"
        )
        INDEX=$(( RANDOM % ${#CAPTIONS[@]} ))
        SELECTED_CAPTION="${CAPTIONS[$INDEX]}"
        EVALUATED_CAPTION=$(echo -e "$SELECTED_CAPTION")
        npx tsx scripts/post_to_instagram.ts out/video.mp4 "$EVALUATED_CAPTION"
