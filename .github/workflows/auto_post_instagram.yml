name: Daily Instagram Auto-Post

on:
  schedule:
    # 毎日 日本時間 20:00 (UTC 11:00) に自動実行
    - cron: '0 11 * * *'
  workflow_dispatch: # GitHubの画面から手動でテスト実行できるボタン

jobs:

  # ===== 日本語アカウント（Account 1）=====
  post-japanese:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./marketing_automation/video_generator
      run: npm install

    - name: Convert .mov assets to .mp4
      working-directory: ./marketing_automation/video_generator
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
        ffmpeg -i public/assets/part3/part3.mov -vcodec libx264 -acodec aac public/assets/part3/part3.mp4
        ffmpeg -i public/assets/part4/part4.mov -vcodec libx264 -acodec aac public/assets/part4/part4.mp4
        sed -i 's/part3.mov/part3.mp4/g' src/Root.tsx
        sed -i 's/part4.mov/part4.mp4/g' src/Root.tsx

    - name: Pick a random Japanese composition
      id: pick
      run: |
        COMPOSITIONS=("Feature1-TimeLock" "Feature2-TradeLog" "Feature3-SecureProfit" "Feature4-Questionnaire")
        INDEX=$(( RANDOM % ${#COMPOSITIONS[@]} ))
        echo "composition=${COMPOSITIONS[$INDEX]}" >> $GITHUB_OUTPUT

    - name: Render Video
      working-directory: ./marketing_automation/video_generator
      run: npx remotion render src/index.ts ${{ steps.pick.outputs.composition }} out/video.mp4 --timeout=120000

    - name: Post to Instagram (Japanese account)
      working-directory: ./marketing_automation/video_generator
      env:
        IG_USER_ID: ${{ secrets.IG_USER_ID }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      run: |
        npx tsx scripts/post_to_instagram.ts out/video.mp4 "感情で負けるな。Trade Blockで強制ロック 🔒\n\n『なぜ90%のデイトレーダーは資金を溶かすのか？』\n手法が悪いのではありません。脳の「興奮状態（ポジポジ病）」が原因です。\n\nTrade Blockは、タイマー設定で指定した時間中、\n強制的に取引画面からあなたを物理的に遮断します。\n\n🔥 損失を取り返そうとする「焦り」\n🔥 少しの利益ですぐ利確してしまう「チキン利食い」\n\nこれらはすべて、システムにブロックさせることで解決できます。\n\n✅ プロフィールリンクから今すぐダウンロードして、無駄な負けをゼロにしよう。\n\n#FX #デイトレード #ポジポジ病 #投資家と繋がりたい #株式投資 #トレード日誌 #FX初心者 #ダウ理論 #自動売買"

  # ===== 英語アカウント（Account 2）=====
  post-english:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./marketing_automation/video_generator
      run: npm install

    - name: Convert .mov assets to .mp4
      working-directory: ./marketing_automation/video_generator
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
        ffmpeg -i public/assets/part3/part3.mov -vcodec libx264 -acodec aac public/assets/part3/part3.mp4
        ffmpeg -i public/assets/part4/part4.mov -vcodec libx264 -acodec aac public/assets/part4/part4.mp4
        sed -i 's/part3.mov/part3.mp4/g' src/Root.tsx
        sed -i 's/part4.mov/part4.mp4/g' src/Root.tsx

    - name: Pick a random English composition
      id: pick
      run: |
        COMPOSITIONS=("Feature1-TimeLock-EN" "Feature2-TradeLog-EN" "Feature3-SecureProfit-EN" "Feature4-Questionnaire-EN")
        INDEX=$(( RANDOM % ${#COMPOSITIONS[@]} ))
        echo "composition=${COMPOSITIONS[$INDEX]}" >> $GITHUB_OUTPUT

    - name: Render Video
      working-directory: ./marketing_automation/video_generator
      run: npx remotion render src/index.ts ${{ steps.pick.outputs.composition }} out/video.mp4 --timeout=120000

    - name: Post to Instagram (English account)
      working-directory: ./marketing_automation/video_generator
      env:
        IG_USER_ID: ${{ secrets.IG_USER_ID_2 }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN_2 }}
      run: |
        npx tsx scripts/post_to_instagram.ts out/video.mp4 "Stop overtrading. Trade Block forces you to step away 🔒\n\nWhy do 90% of day traders lose money?\nIt's not your strategy. It's the 'euphoria' of the brain that causes overtrading.\n\nTrade Block physically blocks you from your trading apps for a set timer, preventing those emotional revenge trades.\n\n🔥 Stop revenge trading after a loss.\n🔥 Stop taking profits too early out of fear.\n\nLet the system block your bad habits.\n\n✅ Download now from the link in our profile and save your portfolio from yourself.\n\n#daytrading #forex #trading #stockmarket #tradingpsychology #forexsignals #crypto #propfirm"

  # ===== 中国語アカウント（Account 3）=====
  post-chinese:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./marketing_automation/video_generator
      run: npm install

    - name: Convert .mov assets to .mp4
      working-directory: ./marketing_automation/video_generator
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
        ffmpeg -i public/assets/part3/part3.mov -vcodec libx264 -acodec aac public/assets/part3/part3.mp4
        ffmpeg -i public/assets/part4/part4.mov -vcodec libx264 -acodec aac public/assets/part4/part4.mp4
        sed -i 's/part3.mov/part3.mp4/g' src/Root.tsx
        sed -i 's/part4.mov/part4.mp4/g' src/Root.tsx

    - name: Pick a random Chinese composition
      id: pick
      run: |
        COMPOSITIONS=("Feature1-TimeLock-CN" "Feature2-TradeLog-CN" "Feature3-SecureProfit-CN" "Feature4-Questionnaire-CN")
        INDEX=$(( RANDOM % ${#COMPOSITIONS[@]} ))
        echo "composition=${COMPOSITIONS[$INDEX]}" >> $GITHUB_OUTPUT

    - name: Render Video
      working-directory: ./marketing_automation/video_generator
      run: npx remotion render src/index.ts ${{ steps.pick.outputs.composition }} out/video.mp4 --timeout=120000

    - name: Post to Instagram (Chinese account)
      working-directory: ./marketing_automation/video_generator
      env:
        IG_USER_ID: ${{ secrets.IG_USER_ID_3 }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN_3 }}
      run: |
        npx tsx scripts/post_to_instagram.ts out/video.mp4 "停止过度交易。Trade Block强制锁定帮助你冷静 🔒\n\n为什么90%的日内交易者会亏损？\n问题不在乎你的策略，而是大脑的“兴奋状态”导致了频繁交易。\n\nTrade Block通过设定计时器，在指定时间内强制屏蔽你的交易应用，防止情绪化的报复性交易。\n\n🔥 停止亏损后的上头交易\n🔥 停止因为恐惧而过早平仓\n\n让系统来阻止你破坏账户余额。\n\n✅ 立即点击主页链接下载，把不必要的亏损降到零。\n\n#交易 #外汇 #日内交易 #股票 #交易心理 #投资理财 #加密货币 #美股"
