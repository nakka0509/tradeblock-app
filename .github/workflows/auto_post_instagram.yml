name: Daily Instagram Auto-Post

on:
  schedule:
    # 毎日 日本時間 20:00 (UTC 11:00) に自動実行
    - cron: '0 11 * * *'
  workflow_dispatch: # GitHubの画面から手動でテスト実行できるボタン

jobs:

  # ===== 日本語アカウント（Account 1）=====
  post-japanese:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./marketing_automation/video_generator
      run: npm install

    - name: Convert .mov assets to .mp4
      working-directory: ./marketing_automation/video_generator
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg
        ffmpeg -i public/assets/part3/part3.mov -vcodec libx264 -acodec aac public/assets/part3/part3.mp4
        ffmpeg -i public/assets/part4/part4.mov -vcodec libx264 -acodec aac public/assets/part4/part4.mp4
        sed -i 's/part3.mov/part3.mp4/g' src/Root.tsx
        sed -i 's/part4.mov/part4.mp4/g' src/Root.tsx

    - name: Pick a random Japanese composition
      id: pick
      run: |
        COMPOSITIONS=("Feature1-TimeLock" "Feature2-TradeLog" "Feature3-SecureProfit" "Feature4-Questionnaire")
        INDEX=$(( RANDOM % ${#COMPOSITIONS[@]} ))
        echo "composition=${COMPOSITIONS[$INDEX]}" >> $GITHUB_OUTPUT

    - name: Render Video
      working-directory: ./marketing_automation/video_generator
      run: npx remotion render src/index.ts ${{ steps.pick.outputs.composition }} out/video.mp4 --timeout=120000

    - name: Post to Instagram (Japanese account)
      working-directory: ./marketing_automation/video_generator
      env:
        IG_USER_ID: ${{ secrets.IG_USER_ID }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      run: |
        npx tsx scripts/post_to_instagram.ts out/video.mp4 "感情で負けるな。Trade Blockで強制ロック ✅ プロフィールから今すぐダウンロード #FX #デイトレ #ポジポジ病 #投資家と繋がりたい #株式投資"

  # ===== 英語アカウント（Account 2）=====
  post-english:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./marketing_automation/video_generator
      run: npm install

    - name: Convert .mov assets to .mp4
      working-directory: ./marketing_automation/video_generator
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg
        ffmpeg -i public/assets/part3/part3.mov -vcodec libx264 -acodec aac public/assets/part3/part3.mp4
        ffmpeg -i public/assets/part4/part4.mov -vcodec libx264 -acodec aac public/assets/part4/part4.mp4
        sed -i 's/part3.mov/part3.mp4/g' src/Root.tsx
        sed -i 's/part4.mov/part4.mp4/g' src/Root.tsx

    - name: Pick a random English composition
      id: pick
      run: |
        COMPOSITIONS=("Feature1-TimeLock-EN" "Feature2-TradeLog-EN" "Feature3-SecureProfit-EN" "Feature4-Questionnaire-EN")
        INDEX=$(( RANDOM % ${#COMPOSITIONS[@]} ))
        echo "composition=${COMPOSITIONS[$INDEX]}" >> $GITHUB_OUTPUT

    - name: Render Video
      working-directory: ./marketing_automation/video_generator
      run: npx remotion render src/index.ts ${{ steps.pick.outputs.composition }} out/video.mp4 --timeout=120000

    - name: Post to Instagram (English account)
      working-directory: ./marketing_automation/video_generator
      env:
        IG_USER_ID: ${{ secrets.IG_USER_ID_2 }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN_2 }}
      run: |
        npx tsx scripts/post_to_instagram.ts out/video.mp4 "Stop overtrading. Trade Block forces you to step away 🔒 Download now from profile link. #daytrading #forex #trading #stockmarket #tradingpsychology"

  # ===== 中国語アカウント（Account 3）=====
  post-chinese:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./marketing_automation/video_generator
      run: npm install

    - name: Convert .mov assets to .mp4
      working-directory: ./marketing_automation/video_generator
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg
        ffmpeg -i public/assets/part3/part3.mov -vcodec libx264 -acodec aac public/assets/part3/part3.mp4
        ffmpeg -i public/assets/part4/part4.mov -vcodec libx264 -acodec aac public/assets/part4/part4.mp4
        sed -i 's/part3.mov/part3.mp4/g' src/Root.tsx
        sed -i 's/part4.mov/part4.mp4/g' src/Root.tsx

    - name: Pick a random Chinese composition
      id: pick
      run: |
        COMPOSITIONS=("Feature1-TimeLock-CN" "Feature2-TradeLog-CN" "Feature3-SecureProfit-CN" "Feature4-Questionnaire-CN")
        INDEX=$(( RANDOM % ${#COMPOSITIONS[@]} ))
        echo "composition=${COMPOSITIONS[$INDEX]}" >> $GITHUB_OUTPUT

    - name: Render Video
      working-directory: ./marketing_automation/video_generator
      run: npx remotion render src/index.ts ${{ steps.pick.outputs.composition }} out/video.mp4 --timeout=120000

    - name: Post to Instagram (Chinese account)
      working-directory: ./marketing_automation/video_generator
      env:
        IG_USER_ID: ${{ secrets.IG_USER_ID_3 }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN_3 }}
      run: |
        npx tsx scripts/post_to_instagram.ts out/video.mp4 "停止过度交易。Trade Block强制锁定帮助你冷静 🔒 点击主页链接立即下载 #交易 #外汇 #日内交易 #股票 #交易心理"
