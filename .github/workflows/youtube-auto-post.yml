name: YouTube Auto Post

on:
  schedule:
    # Run twice a day (e.g., 10:00 AM and 10:00 PM JST = 1:00 AM and 1:00 PM UTC)
    - cron: '0 1,13 * * *'
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './marketing_automation/video_generator/package-lock.json'

      - name: Install dependencies
        working-directory: ./marketing_automation/video_generator
        run: npm ci

      - name: Set up FFmpeg (required for Remotion / Audio)
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Generate Random Video Props
        working-directory: ./marketing_automation/video_generator
        run: node scripts/prepare_daily_video.ts
        env:
          TARGET_PLATFORM: youtube

      - name: Render Video
        working-directory: ./marketing_automation/video_generator
        run: npx remotion render Root out/video.mp4 --props=./src/dailyOverride.json

      - name: Upload to YouTube
        working-directory: ./marketing_automation/video_generator
        run: node scripts/upload_youtube.mjs
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
